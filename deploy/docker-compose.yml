name: helios

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.7
    container_name: helios-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: true'"]
      interval: 5s
      timeout: 3s
      retries: 25

  console:
    image: docker.redpanda.com/redpandadata/console:v3.4.0
    container_name: helios-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_CLIENT_ID: "helios-console"
      KAFKA_TLS_ENABLED: "false"
    ports:
      - "8080:8080"

  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    container_name: helios-clickhouse
    environment:
      CLICKHOUSE_DB: helios
      CLICKHOUSE_USER: helios
      CLICKHOUSE_PASSWORD: helios
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  postgres:
    image: postgres:16
    container_name: helios-postgres
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: helios-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: helios
      MINIO_ROOT_PASSWORD: helios-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  clickhouse_data:
  postgres_data:
  minio_data:
