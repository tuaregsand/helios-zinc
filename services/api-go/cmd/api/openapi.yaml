openapi: 3.0.3
info:
  title: Helios Control Plane API
  version: 1.0.0
  description: |
    Read-only operational API for Helios ingestion and replay metadata.
    All `/v1` endpoints require auth and are rate limited.
servers:
  - url: /
paths:
  /healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service process is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Service dependencies are healthy
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /openapi.yaml:
    get:
      summary: Retrieve this OpenAPI specification
      security:
        - ApiKeyHeader: []
        - BearerJwt: []
        - ApiKeyHeader: []
          OpenAPIToken: []
        - BearerJwt: []
          OpenAPIToken: []
      responses:
        "200":
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/watermarks:
    get:
      summary: List finality watermarks
      security:
        - ApiKeyHeader: []
        - BearerJwt: []
      parameters:
        - in: query
          name: cluster
          schema:
            type: string
          description: Optional cluster filter (token-safe, max 64 chars).
        - in: query
          name: status
          schema:
            type: string
            enum:
              - processed
              - confirmed
              - finalized
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 500
      responses:
        "200":
          description: Watermark list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Watermark"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/replay/jobs:
    get:
      summary: List recent replay jobs
      security:
        - ApiKeyHeader: []
        - BearerJwt: []
      parameters:
        - in: query
          name: cluster
          schema:
            type: string
          description: Optional cluster filter (token-safe, max 64 chars).
        - in: query
          name: status
          schema:
            type: string
            enum:
              - queued
              - running
              - failed
              - done
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Replay jobs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReplayJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    BearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OpenAPIToken:
      type: apiKey
      in: header
      name: X-OpenAPI-Token
  schemas:
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: unauthorized
            message:
              type: string
              example: unauthorized
            request_id:
              type: string
              example: cfd4e1e5ddf4/P6S4PjvS6D-000001
    Watermark:
      type: object
      required:
        - cluster
        - status
        - slot
        - updated_at
      properties:
        cluster:
          type: string
          example: mainnet-beta
        status:
          type: string
          enum:
            - processed
            - confirmed
            - finalized
        slot:
          type: integer
          format: int64
          example: 321991122
        updated_at:
          type: string
          format: date-time
    ReplayJob:
      type: object
      required:
        - job_id
        - cluster
        - slot_start
        - slot_end
        - status
        - created_at
        - updated_at
        - error
      properties:
        job_id:
          type: string
          format: uuid
        cluster:
          type: string
          example: mainnet-beta
        slot_start:
          type: integer
          format: int64
        slot_end:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - queued
            - running
            - failed
            - done
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        error:
          type: string
