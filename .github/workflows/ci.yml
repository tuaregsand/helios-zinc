name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt check
        run: |
          cargo fmt --manifest-path services/gateway-rs/Cargo.toml -- --check
          cargo fmt --manifest-path services/decoder-rs/Cargo.toml -- --check

      - name: Rust clippy
        run: |
          cargo clippy --manifest-path services/gateway-rs/Cargo.toml -- -D warnings
          cargo clippy --manifest-path services/decoder-rs/Cargo.toml -- -D warnings

      - name: Rust test
        run: |
          cargo test --manifest-path services/gateway-rs/Cargo.toml
          cargo test --manifest-path services/decoder-rs/Cargo.toml

  go-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Go fmt check
        run: |
          UNFORMATTED=$(gofmt -l services/api-go services/edge-go services/replay-go)
          if [ -n "$UNFORMATTED" ]; then
            echo "Go files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Go test api-go
        run: |
          cd services/api-go
          go test ./...

      - name: Go test edge-go
        run: |
          cd services/edge-go
          go test ./...

      - name: Go test replay-go
        run: |
          cd services/replay-go
          go test ./...

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --manifest-path services/gateway-rs/Cargo.toml
          cargo audit --manifest-path services/decoder-rs/Cargo.toml

      - name: Go dependency audit
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/api-go
          "$(go env GOPATH)"/bin/govulncheck ./...
          cd ../edge-go
          "$(go env GOPATH)"/bin/govulncheck ./...
          cd ../replay-go
          "$(go env GOPATH)"/bin/govulncheck ./...

  terraform-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/aws/terraform

      - name: Terraform validate
        run: |
          cd infra/aws/terraform
          terraform init -backend=false
          terraform validate

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-go image
        run: docker build -f services/api-go/Dockerfile -t helios-api:ci .

      - name: Build edge-go image
        run: docker build -f services/edge-go/Dockerfile -t helios-edge:ci .

      - name: Build gateway-rs image
        run: docker build -f services/gateway-rs/Dockerfile -t helios-gateway:ci .

      - name: Build decoder-rs image
        run: docker build -f services/decoder-rs/Dockerfile -t helios-decoder:ci .

      - name: Build replay-go image
        run: docker build -f services/replay-go/Dockerfile -t helios-replay:ci .
